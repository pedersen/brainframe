name: brainframe
description: "Open-source second brain + e-reader"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 0.0.1+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  # Localizes the Material/Cupertino widgets themselves and supplies the
  # GlobalMaterial/Widgets/CupertinoLocalizations delegates that
  # AppLocalizations.localizationsDelegates folds in.
  flutter_localizations:
    sdk: flutter

  # ARB message lookup + plural/date formatting behind the generated
  # AppLocalizations. `any` defers to the version flutter_localizations pins.
  intl: any

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  # Command-line parsing for the desktop startup options (see
  # lib/startup_options.dart). The Dart-team ArgParser; already in the tree
  # transitively, promoted to a direct dependency now that we use it directly.
  args: ^2.7.0
  window_manager: ^0.5.1
  shared_preferences: ^2.5.5
  # Direct dependency for InMemorySharedPreferencesAsync, which backs the
  # --ignore-config startup option (see lib/main.dart) with an ephemeral store.
  # Also provides the in-memory fake used throughout the tests.
  shared_preferences_platform_interface: ^2.4.2
  path_provider: ^2.1.6
  flutter_markdown_plus: ^1.0.7
  file_selector: ^1.1.0
  # Reads the app's real semantic version + build number from bundle metadata
  # at runtime, shown on the About screen (lib/about/about_screen.dart) instead
  # of hardcoding pubspec's version. Cross-platform incl. Linux/flutter-pi.
  package_info_plus: ^10.2.1
  # Opens the About screen's Website (external browser) and Contact (mailto)
  # links via the platform handler. Cross-platform incl. Linux/flutter-pi.
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  # Test-only: fake_async drives the DocumentEditController's debounce / max-wait
  # timers deterministically, without real wall-clock delays.
  fake_async: ^1.3.3
  # Localization enforcement, both layers (design Decision 3):
  #   - tool/check_l10n.dart (CLI gate) parses the AST to find hardcoded strings.
  #   - custom_lint runs brainframe_lints' no_raw_widget_strings rule in the IDE.
  # Both use the analyzer package; custom_lint caps it at ^8, so the whole
  # tooling layer is pinned there. This is a dev-only dep — it does not affect
  # the app or `flutter analyze`, which use the SDK's own bundled analyzer.
  analyzer: ^8.0.0
  custom_lint: ^0.8.0
  brainframe_lints:
    path: tool/lints

# Launcher icons generated from the BrainFrame logo for every platform.
# Regenerate with: dart run flutter_launcher_icons
# Linux has no in-toolchain launcher-icon mechanism, so it is handled at
# packaging time (a .desktop entry plus icon) rather than here.
# Debug builds use a separate "dev" icon (brainframe-dev.png), generated for
# every platform by `python3 tool/gen_debug_icons.py` — see
# docs/debug-build-identity.md.
flutter_launcher_icons:
  image_path: "brainframe.png"
  android: true
  # The logo is a full-bleed RGB image with no alpha, so pair it with a solid
  # adaptive-icon background. Revisit with a padded foreground if the launcher
  # mask clips the artwork.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "brainframe.png"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Run gen-l10n on the ARB files in lib/l10n during pub get / build / test,
  # generating AppLocalizations into lib/l10n/gen (see l10n.yaml). That output
  # is git-ignored and regenerated, never committed.
  generate: true

  # The BrainFrame logo, shown on the home screen and used as the icon source.
  #
  # The built-in tutorial and help engrams ship as bundled assets, read
  # read-only through AssetEngramStore. Their content is locale-partitioned: the
  # base locale (en/) defines the canonical page set, and a translation adds a
  # sibling <locale>/ directory (AssetEngramStore falls back to en/ per file).
  # Flutter's asset-directory listing is NOT recursive — a trailing-slash entry
  # bundles only the files directly in that directory — so every subdirectory
  # (e.g. tutorial/en/notes/) is listed on its own line. A new translation adds
  # its <locale>/ directories here (see lib/l10n/README.md).
  assets:
    - brainframe.png
    - assets/engrams/tutorial/en/
    - assets/engrams/tutorial/en/notes/
    - assets/engrams/help/en/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
