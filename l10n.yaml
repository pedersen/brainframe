# Configuration for Flutter's gen-l10n tool. Runs automatically because
# `flutter: generate: true` is set in pubspec.yaml (on pub get / build / test).
#
# ARB files live in lib/l10n; app_en.arb is the template (defines the keys and
# their @-descriptions). Generated Dart lands in lib/l10n/gen, which is
# git-ignored and excluded from the coverage trace — it is derived code,
# regenerated by the build, never committed or hand-edited (design Decision 4).
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-dir: lib/l10n/gen
output-localization-file: app_localizations.dart
output-class: AppLocalizations
# A missing translation should never yield a null at a call site: getters are
# non-nullable, and gen-l10n fills any gap from the template locale.
nullable-getter: false
