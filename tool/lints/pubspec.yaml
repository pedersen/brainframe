# An in-repo custom_lint plugin. It holds the one shared "widget text slot"
# definition (lib/text_slots.dart) used by both enforcement layers so they can
# never disagree about what counts as a hardcoded UI string:
#   - the CLI gate  tool/check_l10n.dart          (imports text_slots.dart)
#   - the no_raw_widget_strings rule (lib/brainframe_lints.dart, this package)
name: brainframe_lints
description: Custom lint plugin + shared widget-text-slot definitions.
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.12.2

dependencies:
  # custom_lint caps analyzer at ^8; the whole tooling layer is pinned to match.
  analyzer: ^8.0.0
  custom_lint_builder: ^0.8.0
