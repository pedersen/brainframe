# Non-blocking reminder: when a PR changes user-facing UI code but doesn't touch
# docs/manual-test-plan.md, post one self-clearing sticky comment asking whether
# the manual test plan needs updating. NEVER fails the check — it is a nudge, not
# a gate (a pure refactor legitimately changes UI code with no behavior delta, so
# a hard gate would just train people to touch the doc to go green). The rule
# lives in CLAUDE.md ("Manual test plan").
#
# Scope is defined once, below, in `on.pull_request.paths`: the job only wakes
# when a UI directory changes OR the plan itself changes (the latter so that
# updating the plan re-runs the job and clears the comment). Widen that list as
# UI code spreads to new directories.
name: test-plan-nudge
on:
  pull_request:
    paths:
      - 'lib/**/ui/**'     # widgets under any ui/ package (e.g. lib/engram/ui/)
      - 'lib/settings/**'  # settings screen + controls
      - 'lib/about/**'     # about pane
      - 'lib/widgets/**'   # shared widgets (AppScaffold, …)
      - 'docs/manual-test-plan.md' # updating the plan re-runs the job to clear
permissions:
  contents: read
  pull-requests: write # to upsert / clear one sticky reminder comment
jobs:
  nudge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base ref to diff the whole PR
      - name: Was the plan updated in this PR?
        id: check
        run: |
          # The job only ran because on.pull_request.paths matched — i.e. a UI
          # directory changed, or the plan did. So the decision reduces to one
          # question: is the plan in this PR's diff?
          #   plan present -> the author updated it     -> clear the comment
          #   plan absent  -> a UI path is what woke us  -> post the comment
          base="origin/${{ github.base_ref }}"
          if git diff --name-only "$base"...HEAD \
               | grep -qFx 'docs/manual-test-plan.md'; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi
      # Skip on forked PRs: their GITHUB_TOKEN is read-only, so the comment API
      # can't write. Forks simply get no nudge (rare in a solo repo). The
      # try/catch below is a second belt so an API hiccup can never fail the job.
      - name: Upsert or clear the sticky reminder
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- test-plan-nudge -->';
            const stale = '${{ steps.check.outputs.stale }}' === 'true';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const { data: comments } = await github.rest.issues.listComments(
                { owner, repo, issue_number },
              );
              const existing = comments.find((c) => c.body.includes(marker));
              if (stale) {
                const body = `${marker}\n⚠️ **Manual test plan may be stale.** `
                  + `This PR changes UI code (\`lib/**/ui/\`, \`lib/settings/\`, `
                  + `\`lib/about/\`, \`lib/widgets/\`) but does not update `
                  + `\`docs/manual-test-plan.md\`. If it adds, alters, or removes `
                  + `a user-facing interaction, update the plan and list the `
                  + `affected case IDs (F-nn, D-n) in the PR summary. If not, `
                  + `ignore this — it does not block the merge.`;
                existing
                  ? await github.rest.issues.updateComment(
                      { owner, repo, comment_id: existing.id, body })
                  : await github.rest.issues.createComment(
                      { owner, repo, issue_number, body });
              } else if (existing) {
                await github.rest.issues.deleteComment(
                  { owner, repo, comment_id: existing.id });
              }
            } catch (e) {
              core.warning(`test-plan-nudge: skipped (${e.message})`);
            }
