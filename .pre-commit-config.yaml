# Pre-commit hooks for BrainFrame.
#
# One-time setup after cloning:
#   uv tool install pre-commit   # (or: pipx install pre-commit)
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#   dart pub global activate coverde        # coverage filter + threshold gate
#   export PATH="$PATH:$HOME/.pub-cache/bin" # so `coverde` is on PATH
#
# After that, staged Markdown is auto-fixed on every commit using
# markdownlint-cli2, which reads its rules from .markdownlint-cli2.jsonc.
# If the linter changes a file, the commit stops so you can review and
# re-stage — standard fix-hook behavior.
#
# Whenever Dart files are staged, `flutter analyze` runs against the project
# and blocks the commit on any analyzer issue. It needs `flutter` on PATH and
# `flutter pub get` to have run at least once (so .dart_tool exists).
#
# On `git push`, the coverage pipeline (tool/coverage.sh) runs the full test
# suite with coverage and blocks the push if honest coverage drops below 90%.
# It runs on push rather than commit so routine commits stay fast; the same
# pipeline is the authoritative gate in CI (.github/workflows/coverage.yml).
#
# Each hook sets `stages:` explicitly — a hook with no stages runs in every
# stage, which would make the commit-stage hooks also fire on push.
repos:
  - repo: local
    hooks:
      - id: markdownlint-cli2-fix
        name: markdownlint-cli2 (auto-fix markdown)
        language: system
        entry: markdownlint-cli2 --fix
        files: \.(md|markdown)$
        stages: [pre-commit]
      - id: flutter-analyze
        name: flutter analyze
        language: system
        # `env -u GIT_*` strips the git-hook environment. Git exports GIT_DIR
        # and friends pointing at this repo when it runs a hook, which would
        # otherwise hijack Flutter's own version-detection git calls and make
        # it report "0.0.0-unknown", breaking pub resolution.
        entry: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE flutter analyze
        # Analyze the whole project once, not per-file, but only when Dart
        # changes are staged.
        files: \.dart$
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]
      - id: l10n-gate
        name: l10n gate (no hardcoded UI strings; pseudo-locale fresh)
        language: system
        # Cross-platform Dart check (no bash/grep): AST-scans lib/ for hardcoded
        # widget-slot strings and verifies app_en_XA.arb matches the generator.
        # GIT_* stripped for the same reason as flutter analyze above.
        entry: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE dart run tool/check_l10n.dart
        # Scans the whole tree once; run when Dart or ARB files are staged.
        files: \.(dart|arb)$
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]
      - id: coverage-gate
        name: coverage gate (flutter test --coverage, >=90%)
        language: system
        # See the flutter-analyze note: strip the git-hook environment so
        # Flutter can detect its own SDK version. tool/coverage.sh runs the
        # full suite with coverage, filters documented exclusions, and fails
        # the push under 90%. Needs `coverde` on PATH (see setup notes above).
        entry: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE bash tool/coverage.sh
        # Run the whole pipeline on every push, regardless of which files changed.
        always_run: true
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
